<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{{ texts.site_name }}{% endblock %}</title>
  <link rel="stylesheet" href="/static/style.css">
  <meta name="description" content="Ethiopian Grade 12 exam study guide — focus on what matters.">
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="/">
    🇪🇹 {{ texts.site_name }}
  </a>
  <div class="navbar-right">
    <a href="/lang/en?redirect={{ request.url.path }}" class="lang-btn {% if lang == 'en' %}active{% endif %}">EN</a>
    <a href="/lang/am?redirect={{ request.url.path }}" class="lang-btn {% if lang == 'am' %}active{% endif %}">አማ</a>
  </div>
</nav>

{% block content %}{% endblock %}

<footer style="text-align:center;padding:2rem 1rem;color:#888;font-size:0.82rem;margin-top:3rem;border-top:1px solid #e0e0e0;">
  Built to help Ethiopian students pass the Grade 12 national exam.<br>
  Model accuracy: 100% topic hit rate · 75% rank correlation (6-year backtest).
</footer>

</body>
</html>
